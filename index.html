<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 擬真師培報名系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const GOOGLE_SHEETS_API_URL = "https://script.google.com/macros/s/AKfycbx6hj8Fpkn9ZpgDusVvnS-JupmieroJR68QrXAekwZGa6gLqvpcovBGpVj7S8tQUaSb/exec";

        const COURSES = [
            { id: 'course-05', month: '五月份', date: '2026-05-04', time: '10:00-12:00', title: '臨床資源管理與急救分工: TRM理論與實務應用', instructor: '教學研究部 王莨惟 主治醫師', assistant: '護理部RRT 游文英 護理長', limit: 5 },
            { id: 'course-06', month: '六月份', date: '2026-06-16', time: '10:00-12:00', title: '領導與組織: 從臨床案例中刻意練習管理工具', instructor: '鄭凱元 主任', assistant: '急診醫學部 吳明翰 主治醫師', limit: 5 },
            { id: 'course-07', month: '七月份', date: '2026-07-14', time: '14:00-16:00', title: '臨床團隊溝通與守望相助: 提升協作效能', instructor: '陳椿宜 主治醫師', assistant: '護理部 崔若昀 護理長', limit: 5 },
            { id: 'course-08', month: '八月份', date: '2026-08-18', time: '10:00-12:00', title: '特殊外傷案例模擬: 資源管理與團隊合作的挑戰', instructor: '鄭凱元 主任', assistant: '急診醫學部 陳奕融 主治醫師', limit: 5 },
            { id: 'course-09', month: '九月份', date: '2026-09-22', time: '09:00-11:00', title: '特殊急救案例模擬: 高壓場景中的決策與回饋', instructor: '張鈞傑 主治醫師', assistant: '急診醫學部 李安阜 主治醫師', limit: 5 },
            { id: 'course-10', month: '十月份', date: '2026-10-07', time: '13:30-15:30', title: '跨院區團隊講師交叉訓練: 資源共享與經驗交流', instructor: '李欣諭 主治醫師', assistant: '急診醫學部 李鴻瑋 主治醫師', limit: 5 }
        ];

        function App() {
            const [selectedCourse, setSelectedCourse] = useState(null);
            const [formData, setFormData] = useState({ name: '', jobTitle: '', hospital: '', unit: '', phone: '', email: '' });
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [msg, setMsg] = useState({ type: '', text: '' });
            const [regCounts, setRegCounts] = useState({}); // 儲存各課報名人數

            // 載入時讀取試算表中的報名統計
            useEffect(() => {
                fetch(GOOGLE_SHEETS_API_URL)
                    .then(res => res.json())
                    .then(data => setRegCounts(data))
                    .catch(err => console.error("無法讀取名額:", err));
            }, []);

            const getStatus = (course) => {
                const now = new Date();
                const courseDate = new Date(course.date);
                const start = new Date(courseDate);
                start.setMonth(start.getMonth() - 1);
                const end = new Date(courseDate);
                end.setDate(end.getDate() - 3);

                if (now < start) return 'pending';
                if (now > end) return 'expired';
                if ((regCounts[course.id] || 0) >= course.limit) return 'full';
                return 'open';
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsSubmitting(true);
                
                const payload = {
                    ...formData,
                    courseId: selectedCourse.id,
                    courseTitle: selectedCourse.title,
                    timestamp: new Date().toLocaleString('zh-TW', { timeZone: 'Asia/Taipei' })
                };

                try {
                    await fetch(GOOGLE_SHEETS_API_URL, {
                        method: "POST",
                        mode: "no-cors",
                        body: JSON.stringify(payload)
                    });

                    setMsg({ type: 'success', text: '報名資料已成功送出！' });
                    // 更新本地計數預防重複點擊
                    setRegCounts(prev => ({ ...prev, [selectedCourse.id]: (prev[selectedCourse.id] || 0) + 1 }));
                    setTimeout(() => { setSelectedCourse(null); setMsg({ type: '', text: '' }); }, 3000);
                } catch (e) {
                    setMsg({ type: 'error', text: '送出失敗。' });
                } finally {
                    setIsSubmitting(false);
                }
            };

            return (
                <div className="min-h-screen pb-12 bg-slate-50">
                    <div className="bg-[#004184] h-2 w-full"></div>
                    <div className="max-w-4xl mx-auto px-4 pt-8">
                        <header className="bg-white rounded-[2rem] shadow-xl mb-8 border border-slate-100 overflow-hidden text-center p-8">
                            <h1 className="text-2xl md:text-3xl font-black text-[#004184]">2026 擬真師培報名系統</h1>
                            <p className="text-slate-500 font-bold mt-2">名額有限，額滿即截止報名</p>
                        </header>

                        <div className="grid gap-6">
                            {COURSES.map((course) => {
                                const status = getStatus(course);
                                const currentReg = regCounts[course.id] || 0;
                                return (
                                    <div key={course.id} className="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden md:flex">
                                        <div className={`p-8 md:w-40 flex flex-col justify-center items-center text-center ${status === 'open' ? 'bg-[#004184] text-white' : 'bg-slate-200 text-slate-500'}`}>
                                            <span className="text-xs font-black uppercase tracking-widest">{course.month}</span>
                                            <span className="text-5xl font-black">{course.date.split('-')[2]}</span>
                                        </div>
                                        <div className="p-8 flex-1 flex flex-col justify-between">
                                            <div>
                                                <h3 className="text-xl font-black text-slate-800">{course.title}</h3>
                                                <p className="text-sm text-slate-500 font-bold mt-2">名額狀態：{currentReg} / {course.limit}</p>
                                            </div>
                                            <div className="flex justify-end mt-4">
                                                {status === 'open' ? (
                                                    <button onClick={() => setSelectedCourse(course)} className="px-8 py-3 bg-[#004184] text-white rounded-xl font-black">立即報名</button>
                                                ) : (
                                                    <div className="px-6 py-3 rounded-xl font-black bg-slate-100 text-slate-400">
                                                        {status === 'full' ? '已額滿' : (status === 'pending' ? '尚未開放' : '報名截止')}
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {selectedCourse && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-4 z-[100]">
                            <div className="bg-white rounded-[2.5rem] w-full max-w-md p-8 shadow-2xl relative">
                                <button onClick={() => setSelectedCourse(null)} className="absolute top-6 right-6 font-bold text-slate-400">✕</button>
                                <h2 className="text-xl font-black mb-6">{selectedCourse.title}</h2>
                                <form onSubmit={handleSubmit} className="space-y-4">
                                    {msg.text && <div className={`p-4 rounded-xl font-bold text-center ${msg.type === 'success' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>{msg.text}</div>}
                                    <input required placeholder="姓名" className="w-full px-4 py-3 bg-slate-50 border rounded-xl font-bold" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                                    <input required placeholder="職稱" className="w-full px-4 py-3 bg-slate-50 border rounded-xl font-bold" value={formData.jobTitle} onChange={e => setFormData({...formData, jobTitle: e.target.value})} />
                                    <input required placeholder="服務醫院" className="w-full px-4 py-3 bg-slate-50 border rounded-xl font-bold" value={formData.hospital} onChange={e => setFormData({...formData, hospital: e.target.value})} />
                                    <input required placeholder="所屬單位" className="w-full px-4 py-3 bg-slate-50 border rounded-xl font-bold" value={formData.unit} onChange={e => setFormData({...formData, unit: e.target.value})} />
                                    <input required placeholder="聯絡電話" className="w-full px-4 py-3 bg-slate-50 border rounded-xl font-bold" value={formData.phone} onChange={e => setFormData({...formData, phone: e.target.value})} />
                                    <input required type="email" placeholder="Email" className="w-full px-4 py-3 bg-slate-50 border rounded-xl font-bold" value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} />
                                    <button disabled={isSubmitting || msg.type === 'success'} className="w-full py-4 bg-[#00989d] text-white rounded-2xl font-black">
                                        {isSubmitting ? "處理中..." : "確認送出"}
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
