<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 擬真師培報名系統</title>
    <!-- 使用 Tailwind CSS 進行樣式設計 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 載入 React 核心庫 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 載入 Babel 用於解析 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 載入 Lucide 圖標 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .animate-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 請在此填入您的 Google Apps Script 網址
        const GOOGLE_SHEETS_API_URL = "https://script.google.com/macros/s/AKfycbx6hj8Fpkn9ZpgDusVvnS-JupmieroJR68QrXAekwZGa6gLqvpcovBGpVj7S8tQUaSb/exec";

        const COURSES = [
            { id: 'course-05', month: '五月份', date: '2026-05-04', time: '10:00-12:00', title: '臨床資源管理與急救分工: TRM理論與實務應用', instructor: '教學研究部 王莨惟 主治醫師', assistant: '護理部RRT 游文英 護理長', limit: 5 },
            { id: 'course-06', month: '六月份', date: '2026-06-16', time: '10:00-12:00', title: '領導與組織: 從臨床案例中刻意練習管理工具', instructor: '鄭凱元 主任', assistant: '急診醫學部 吳明翰 主治醫師', limit: 5 },
            { id: 'course-07', month: '七月份', date: '2026-07-14', time: '14:00-16:00', title: '臨床團隊溝通與守望相助: 提升協作效能', instructor: '陳椿宜 主治醫師', assistant: '護理部 崔若昀 護理長', limit: 5 },
            { id: 'course-08', month: '八月份', date: '2026-08-18', time: '10:00-12:00', title: '特殊外傷案例模擬: 資源管理與團隊合作的挑戰', instructor: '鄭凱元 主任', assistant: '急診醫學部 陳奕融 主治醫師', limit: 5 },
            { id: 'course-09', month: '九月份', date: '2026-09-22', time: '09:00-11:00', title: '特殊急救案例模擬: 高壓場景中的決策與回饋', instructor: '張鈞傑 主治醫師', assistant: '急診醫學部 李安阜 主治醫師', limit: 5 },
            { id: 'course-10', month: '十月份', date: '2026-10-07', time: '13:30-15:30', title: '跨院區團隊講師交叉訓練: 資源共享與經驗交流', instructor: '李欣諭 主治醫師', assistant: '急診醫學部 李鴻瑋 主治醫師', limit: 5 }
        ];

        function App() {
            const [selectedCourse, setSelectedCourse] = useState(null);
            const [formData, setFormData] = useState({ name: '', jobTitle: '', hospital: '', unit: '', phone: '', email: '' });
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [msg, setMsg] = useState({ type: '', text: '' });

            const getStatus = (course) => {
                const now = new Date();
                const courseDate = new Date(course.date);
                const start = new Date(courseDate);
                start.setMonth(start.getMonth() - 1);
                const end = new Date(courseDate);
                end.setDate(end.getDate() - 3);
                end.setHours(23, 59, 59);

                if (now < start) return 'pending';
                if (now > end) return 'expired';
                return 'open';
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsSubmitting(true);
                setMsg({ type: '', text: '' });

                const payload = {
                    ...formData,
                    courseId: selectedCourse.id,
                    courseTitle: selectedCourse.title,
                    timestamp: new Date().toLocaleString('zh-TW', { timeZone: 'Asia/Taipei' })
                };

                try {
                    await fetch(GOOGLE_SHEETS_API_URL, {
                        method: "POST",
                        mode: "no-cors",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });

                    setMsg({ type: 'success', text: '報名資料已成功送出！' });
                    setFormData({ name: '', jobTitle: '', hospital: '', unit: '', phone: '', email: '' });
                    setTimeout(() => { setSelectedCourse(null); setMsg({ type: '', text: '' }); }, 3000);
                } catch (e) {
                    setMsg({ type: 'error', text: '送出失敗，請檢查網路連線。' });
                } finally {
                    setIsSubmitting(false);
                }
            };

            return (
                <div className="min-h-screen pb-12">
                    <div className="bg-[#004184] h-2 w-full"></div>
                    
                    <div className="max-w-4xl mx-auto px-4 pt-8">
                        <header className="bg-white rounded-[2rem] shadow-xl mb-8 border border-slate-100 overflow-hidden">
                            <div className="p-8 md:p-12">
                                <div className="flex flex-col md:flex-row justify-between items-center gap-6">
                                    <div className="flex items-center gap-4">
                                        <div className="bg-white p-1 rounded-xl shadow-sm border border-slate-50">
                                            <img src="LOGO(台大醫院).jpg" alt="Logo" className="h-16 w-auto" 
                                                onError={(e) => { e.target.src = "https://placehold.co/200x80?text=NTUH+LOGO"; }} />
                                        </div>
                                        <div>
                                            <h1 className="text-2xl md:text-3xl font-black text-[#004184]">2026 擬真師培報名系統</h1>
                                            <p className="text-sm flex items-center gap-1.5 text-slate-500 font-bold mt-1">
                                                <i data-lucide="map-pin" class="w-4 h-4 text-[#00989d]"></i>
                                                臺大醫院雲林分院 虎尾院區 臨床技能中心
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div className="bg-[#00989d] py-3 text-white text-xs font-black text-center tracking-widest">
                                教學研究部、品質管理中心 聯合主辦 - TTTTT
                            </div>
                        </header>

                        <div className="grid gap-6">
                            {COURSES.map((course) => {
                                const status = getStatus(course);
                                return (
                                    <div key={course.id} className="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden hover:shadow-md transition-shadow">
                                        <div className="md:flex">
                                            <div className={`p-8 md:w-40 flex flex-col justify-center items-center text-center ${
                                                status === 'open' ? 'bg-[#004184] text-white' : 'bg-slate-100 text-slate-400'
                                            }`}>
                                                <span className="text-xs font-black uppercase tracking-widest">{course.month}</span>
                                                <span className="text-5xl font-black">{course.date.split('-')[2]}</span>
                                                <span className="text-xs font-bold mt-2">{course.time}</span>
                                            </div>
                                            
                                            <div className="p-8 md:flex-1 flex flex-col justify-between gap-6">
                                                <div>
                                                    <h3 className="text-xl font-black text-slate-800 mb-2">{course.title}</h3>
                                                    <div className="text-sm font-bold text-slate-600">
                                                        <p>講師：{course.instructor}</p>
                                                        <p className="text-xs text-slate-400 mt-1">助教：{course.assistant}</p>
                                                    </div>
                                                </div>

                                                <div className="flex items-center justify-between pt-6 border-t border-slate-50">
                                                    <p className="text-[11px] text-slate-400 font-bold italic">※ 每梯次限額 {course.limit} 名</p>
                                                    {status === 'open' ? (
                                                        <button onClick={() => setSelectedCourse(course)} className="px-8 py-3 bg-[#004184] text-white rounded-xl font-black hover:bg-blue-800 transition-all shadow-lg shadow-blue-100">
                                                            立即報名
                                                        </button>
                                                    ) : (
                                                        <div className="px-6 py-3 rounded-xl font-black bg-slate-100 text-slate-400 text-xs">
                                                            {status === 'pending' ? '尚未開放' : '報名已截止'}
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>

                        <footer className="mt-12 text-center text-slate-400 p-8 border-t border-slate-200">
                            <p className="text-xs font-black tracking-widest uppercase">© 2026 臺大醫院雲林分院 教學研究部</p>
                        </footer>
                    </div>

                    {selectedCourse && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-4 z-[100] overflow-y-auto">
                            <div className="bg-white rounded-[2.5rem] w-full max-w-md my-8 overflow-hidden shadow-2xl">
                                <div className="bg-[#004184] p-8 text-white relative">
                                    <button onClick={() => setSelectedCourse(null)} className="absolute top-6 right-6 p-2 hover:bg-white/10 rounded-full">✕</button>
                                    <h2 className="text-xl font-black leading-tight pr-8">{selectedCourse.title}</h2>
                                </div>
                                
                                <form onSubmit={handleSubmit} className="p-8 space-y-4">
                                    {msg.text && (
                                        <div className={`p-4 rounded-2xl flex gap-3 text-sm font-bold ${msg.type === 'success' ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700'}`}>
                                            {msg.text}
                                        </div>
                                    )}
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-1">
                                            <label className="text-xs font-black text-slate-400">姓名</label>
                                            <input required className="w-full px-4 py-3 bg-slate-50 border-2 border-slate-100 rounded-xl outline-none focus:border-[#004184] font-bold" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-xs font-black text-slate-400">職稱</label>
                                            <input required className="w-full px-4 py-3 bg-slate-50 border-2 border-slate-100 rounded-xl outline-none focus:border-[#004184] font-bold" value={formData.jobTitle} onChange={e => setFormData({...formData, jobTitle: e.target.value})} />
                                        </div>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-xs font-black text-slate-400">服務醫院</label>
                                        <input required className="w-full px-4 py-3 bg-slate-50 border-2 border-slate-100 rounded-xl outline-none focus:border-[#004184] font-bold" value={formData.hospital} onChange={e => setFormData({...formData, hospital: e.target.value})} />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-xs font-black text-slate-400">所屬單位</label>
                                        <input required className="w-full px-4 py-3 bg-slate-50 border-2 border-slate-100 rounded-xl outline-none focus:border-[#004184] font-bold" value={formData.unit} onChange={e => setFormData({...formData, unit: e.target.value})} />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-xs font-black text-slate-400">聯絡電話</label>
                                        <input required type="tel" className="w-full px-4 py-3 bg-slate-50 border-2 border-slate-100 rounded-xl outline-none focus:border-[#004184] font-bold" value={formData.phone} onChange={e => setFormData({...formData, phone: e.target.value})} />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-xs font-black text-slate-400">電子郵件</label>
                                        <input required type="email" className="w-full px-4 py-3 bg-slate-50 border-2 border-slate-100 rounded-xl outline-none focus:border-[#004184] font-bold" value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} />
                                    </div>
                                    <button disabled={isSubmitting || msg.type === 'success'} className="w-full py-4 bg-[#00989d] text-white rounded-2xl font-black hover:bg-[#00b0b5] transition-all flex justify-center items-center gap-2 shadow-lg shadow-teal-100 mt-4">
                                        {isSubmitting ? "傳送中..." : "送出報名"}
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // 初始化 Lucide 圖標
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
